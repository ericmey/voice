# LiveKit voice infrastructure.
#
# Orchestrates the container-side services: livekit-server (WebRTC signaling +
# TURN), livekit-sip (SIP trunk to Twilio, room dispatch), livekit-egress
# (audio-only call recordings), and redis (shared state between them).
#
# NOT in this compose file: the Python voice agents (nyla, aoi, yua, sumi).
# The agents live in docker-compose.agents.yaml and run as their own
# containers (voice-agent-<name>) from the voice-agent:latest image. Bring
# up the full stack — infra + agents — with:
#   docker compose -f docker-compose.yaml -f docker-compose.agents.yaml up -d
# See docs/ARCHITECTURE.md for the long version.
#
# Pre-flight:
#   1. Stop brew's redis if you had one running:
#        brew services stop redis
#      (compose redis listens on the same 127.0.0.1:6379 port)
#   2. Make sure ./config/ has the three config files this compose
#      bind-mounts in (livekit.yaml, livekit-sip.yaml, livekit-egress.yaml).
#      Use scripts/bootstrap.sh to copy templates into place, or point at a
#      different directory via `LIVEKIT_CONFIG_DIR=/abs/path`.
#   3. Host networking for livekit-sip: native on Linux (the mizuki prod
#      host), where `network_mode: host` binds directly. On macOS dev,
#      enable host networking in Docker Desktop (Settings > Resources >
#      Network) — sip needs it to advertise the host's real IP in SDP and
#      forward RTP on 10000-20000/udp.
#
# Bring up:  docker compose up -d
# Bring down: docker compose down
# Tail logs:  docker compose logs -f

# Compose project name, pinned. Without this it derives from the directory, so
# renaming the checkout orphans every project-scoped volume — including
# redis_data, which holds `sip_dispatch_rule` and `sip_inbound_trunk`. Losing
# those silently breaks inbound phone routing while every container still looks
# healthy.
name: voice

services:
  redis:
    image: redis:7-alpine
    container_name: voice-redis
    restart: unless-stopped
    # Persistent across container restarts so SIP trunk + dispatch-rule
    # state survives Docker Desktop updates, host reboot, power loss.
    # Without this, every restart wipes routing and inbound calls fail
    # silently with the misleading "flood" label until someone runs
    # scripts/register-sip-routing.sh by hand. RDB snapshot every 60s
    # if there's been ≥1 change + AOF for everything in between.
    command:
      - "redis-server"
      - "--save"
      - "60 1"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    # Docker-native liveness. redis-cli ships in the image; PONG means the
    # routing store (sip_dispatch_rule / sip_inbound_trunk) is reachable.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s

  livekit-server:
    image: livekit/livekit-server:v1.13.3
    container_name: voice-livekit-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # Bridge networking + explicit port forwards. WebRTC clients connect
    # through 7880 (WebSocket signaling) and 7882 (UDP TURN); the TCP TURN
    # fallback is 7881.
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ${LIVEKIT_CONFIG_DIR:-./config}/livekit.yaml:/etc/livekit.yaml:ro
    command: ["--config", "/etc/livekit.yaml"]
    # livekit-server answers "OK" on GET :7880/ once signaling is up; wget
    # ships in the image. Agents gate their start on this being healthy.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:7880/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s

  livekit-sip:
    image: livekit/sip:v1.6.0
    container_name: voice-livekit-sip
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      livekit-server:
        condition: service_healthy
    # Host networking is required — see the top-of-file preflight note.
    # Bridge mode can't forward the 10k-port RTP range cleanly and SDP
    # advertisement gets mangled.
    network_mode: host
    volumes:
      - ${LIVEKIT_CONFIG_DIR:-./config}/livekit-sip.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]

  livekit-egress:
    image: livekit/egress:v1.13.0
    container_name: voice-livekit-egress
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      livekit-server:
        condition: service_healthy
    cap_add:
      - SYS_ADMIN
    shm_size: "1gb"
    environment:
      EGRESS_CONFIG_FILE: /config.yaml
    volumes:
      - ${LIVEKIT_CONFIG_DIR:-./config}/livekit-egress.yaml:/config.yaml:ro
      - ./logs/voice/recordings:/recordings

# Observability — full traces + logs + metrics with trace correlation —
# is exported over OTLP/HTTP to whatever collector you configure in
# secrets/livekit-agents.env. The collector is intentionally not part of
# this compose file; run your own local collector/LGTM stack or point at
# a hosted OTLP backend.
#
# Agents flip on by setting VOICE_OTEL_ENABLED=true and
# VOICE_OTLP_ENDPOINT=http://localhost:4318/v1/traces in
# secrets/livekit-agents.env. Logs ship through the same OTLP endpoint
# via OTLPLogExporter when VOICE_OTEL_LOGS_ENABLED=true.

# Named volume for persistent Redis state. Survives container recreation
# and Docker Desktop updates. Wiped only by `docker compose down -v`.
volumes:
  redis_data:
