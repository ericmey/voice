# OpenClaw LiveKit infrastructure.
#
# Orchestrates the container-side services: livekit-server (WebRTC signaling +
# TURN), livekit-sip (SIP trunk to Twilio, room dispatch), livekit-egress
# (audio-only call recordings), and redis (shared state between them).
#
# NOT in this compose file: the Python voice agents (nyla, aoi, party).
# Agents run as macOS launch agents via launchd, rendered from templates in
# config/launchd/. Rationale: host-native Python venvs with hot reload + crash
# restart are simpler on this box than wrestling with containerized Python on
# Docker Desktop. See docs/ARCHITECTURE.md for the long version.
#
# Pre-flight:
#   1. Stop brew's redis if you had one running:
#        brew services stop redis
#      (compose redis listens on the same 127.0.0.1:6379 port)
#   2. Make sure ./config/ has the three config files this compose
#      bind-mounts in (livekit.yaml, livekit-sip.yaml). Use
#      scripts/bootstrap.sh to copy templates into place, or point at a
#      different directory via `LIVEKIT_CONFIG_DIR=/abs/path`.
#   3. On macOS: enable host networking in Docker Desktop (Settings > Resources
#      > Network). livekit-sip needs it to advertise the host's real IP in SDP
#      and to forward RTP on 10000-20000/udp.
#
# Bring up:  docker compose up -d
# Bring down: docker compose down
# Tail logs:  docker compose logs -f

services:
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    # Persistent across container restarts so SIP trunk + dispatch-rule
    # state survives Docker Desktop updates, host reboot, power loss.
    # Without this, every restart wipes routing and inbound calls fail
    # silently with the misleading "flood" label until someone runs
    # scripts/register-sip-routing.sh by hand. RDB snapshot every 60s
    # if there's been ≥1 change + AOF for everything in between.
    command:
      - "redis-server"
      - "--save"
      - "60 1"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  livekit-server:
    image: livekit/livekit-server:v1.10.1
    container_name: openclaw-livekit-server
    restart: unless-stopped
    depends_on:
      - redis
    # Bridge networking + explicit port forwards. WebRTC clients connect
    # through 7880 (WebSocket signaling) and 7882 (UDP TURN); the TCP TURN
    # fallback is 7881.
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ${LIVEKIT_CONFIG_DIR:-./config}/livekit.yaml:/etc/livekit.yaml:ro
    command: ["--config", "/etc/livekit.yaml"]

  livekit-sip:
    image: livekit/sip:v1.2.0
    container_name: openclaw-livekit-sip
    restart: unless-stopped
    depends_on:
      - redis
      - livekit-server
    # Host networking is required — see the top-of-file preflight note.
    # Bridge mode can't forward the 10k-port RTP range cleanly and SDP
    # advertisement gets mangled.
    network_mode: host
    volumes:
      - ${LIVEKIT_CONFIG_DIR:-./config}/livekit-sip.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]

  livekit-egress:
    image: livekit/egress:v1.12.0
    container_name: openclaw-livekit-egress
    restart: unless-stopped
    depends_on:
      - redis
      - livekit-server
    cap_add:
      - SYS_ADMIN
    shm_size: "1gb"
    environment:
      EGRESS_CONFIG_FILE: /config.yaml
    volumes:
      - ${LIVEKIT_CONFIG_DIR:-./config}/livekit-egress.yaml:/config.yaml:ro
      - ./logs/voice/recordings:/recordings

# Local "Datadog-light" observability — full traces + logs + metrics with
# trace correlation — runs in a sibling SigNoz stack, NOT in this compose.
# Why a separate stack? SigNoz ships a battle-tested ~6-container compose
# (ClickHouse, Zookeeper, query-service, UI, collector, migrator) plus
# config files we don't want to vendor and maintain. We run it via
# `scripts/signoz.sh` which clones the upstream repo into ~/.signoz and
# `docker compose up`s it on demand. See `make signoz-up`.
#
# Once running, SigNoz exposes:
#   - http://localhost:8080         — UI
#   - http://localhost:4318/v1/...  — OTLP HTTP (point agents here)
#   - http://localhost:4317         — OTLP gRPC
#
# Agents flip on by setting OPENCLAW_OTEL_EXPORTERS=langsmith,otlp and
# OPENCLAW_OTLP_ENDPOINT=http://localhost:4318/v1/traces in
# secrets/livekit-agents.env. Logs ship through the same OTLP endpoint
# via OTLPLogExporter when OPENCLAW_OTEL_LOGS_ENABLED=true.

# Named volume for persistent Redis state. Survives container recreation
# and Docker Desktop updates. Wiped only by `docker compose down -v`.
volumes:
  redis_data:
