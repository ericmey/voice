# Voice agents — mizuki. Standalone: agents answer the phone and talk to
# Musubi directly; there is no delegation to any other agent.
# Server internal (livekit-server:7880); memory direct to Musubi.
#
# secrets/livekit-agents.env supplies the suffixed MUSUBI_V2_TOKEN_{AOI,NYLA,YUA}.
# scripts/agent-entrypoint.sh picks the one matching $AGENT and exports it as
# MUSUBI_V2_TOKEN, the name the SDK reads. Don't try to do that selection here:
# `${VAR}` in an `environment:` block interpolates from the shell and .env,
# never from env_file, so it would silently resolve to "".
x-agent-common: &agent-common
  image: voice-agent:latest
  env_file: [secrets/livekit-agents.env]
  # Wait for the server to be healthy (not merely started) so agents don't
  # attempt worker registration before signaling is up.
  depends_on:
    livekit-server:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    # Transcripts, trace, telemetry, call-reviews and the post-call memory log
    # all resolve under LIVEKIT_VOICE_LOGS. Bind-mounted so they outlive the
    # container and stay readable from the host.
    - ./logs/voice:/app/logs/voice

x-agent-env: &agent-env
  LIVEKIT_URL: ws://livekit-server:7880
  MUSUBI_V2_BASE_URL: http://musubi.mey.house:8100/v1
  LIVEKIT_VOICE_LOGS: /app/logs/voice
  # Opt-in, and it was `true` under the retired launchd deploy. Left unset, the egress
  # container runs and records nothing. The default host/container recording dirs
  # already line up with the ./logs/voice bind-mount and egress's /recordings.
  VOICE_RECORD_AUDIO: "true"

services:
  agent-aoi:
    <<: *agent-common
    container_name: voice-agent-aoi
    environment:
      <<: *agent-env
      AGENT: aoi

  agent-nyla:
    <<: *agent-common
    container_name: voice-agent-nyla
    environment:
      <<: *agent-env
      AGENT: nyla

  agent-yua:
    <<: *agent-common
    container_name: voice-agent-yua
    environment:
      <<: *agent-env
      AGENT: yua

  agent-party:
    <<: *agent-common
    container_name: voice-agent-party
    environment:
      <<: *agent-env
      AGENT: party
