# Voicebook TTS. Separate from docker-compose.yaml on purpose: this is the only
# service in the repo that needs a GPU, and mixing it into the LiveKit stack
# would make `docker compose up` require CUDA on every host.
services:
  voicebook-tts:
    container_name: voicebook-tts
    build:
      context: ./services/voicebook-tts
      dockerfile: Dockerfile
    image: voicebook-tts:cu128
    # Private interface only. The container listens on 0.0.0.0 inside its own
    # namespace; the PUBLISHED port is bound to loopback on the host.
    ports:
      - "127.0.0.1:5055:5055"
    volumes:
      # Masters and registry are READ-ONLY. This service never writes canon.
      - ${VOICEBOOK_MASTERS:-/srv/voicebook}:/srv/voicebook:ro
      - ${VOICEBOOK_REGISTRY_FILE:-/srv/voicebook/registry.json}:/etc/voicebook/registry.json:ro
      # Model weights persist across container recreation. Without this the
      # 4.3GB checkpoint is re-downloaded on every recreate and a restart
      # silently depends on the network being up.
      - voicebook-hf-cache:/models/hf-cache
    environment:
      - VOICEBOOK_REGISTRY=/etc/voicebook/registry.json
      # PINNED SNAPSHOT PATH, not a repo id. qwen_tts's from_pretrained calls
      # the HF API model_info() even with weights fully cached, and
      # local_files_only=True is NOT honoured — so a repo id makes startup
      # require network. Proven by a 13-restart crash loop. A resolved snapshot
      # path loads fully offline AND pins the exact checkpoint.
      # Prefetch once (needs network):
      #   docker run --rm -v voicebook-hf-cache:/models/hf-cache \
      #     -e HF_HOME=/models/hf-cache --entrypoint python voicebook-tts:cu128 \
      #     -c "from huggingface_hub import snapshot_download as d; print(d('Qwen/Qwen3-TTS-12Hz-1.7B-Base'))"
      - VOICEBOOK_MODEL=${VOICEBOOK_MODEL:-/models/hf-cache/hub/models--Qwen--Qwen3-TTS-12Hz-1.7B-Base/snapshots/fd4b254389122332181a7c3db7f27e918eec64e3}
      - HF_HUB_OFFLINE=1
      - VOICEBOOK_PORT=5055
      - HF_HOME=/models/hf-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  voicebook-hf-cache:
    name: voicebook-hf-cache
